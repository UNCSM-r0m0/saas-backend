name: Microservices CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build all apps
        run: npm run build:all

      - name: Run contract and envelope tests
        run: npm run test:contracts

  compose-smoke:
    runs-on: ubuntu-latest
    needs: build-and-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env file
        run: |
          cp .env.template .env
          echo "NODE_ENV=production" >> .env
          echo "PORT=3000" >> .env

      - name: Build and start compose stack
        run: |
          docker compose -f docker-compose.prod.yml up -d --build postgres redis nats gateway chat auth users billing usage

      - name: Wait for gateway
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:3001/api/health >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Gateway health check timeout" >&2
          docker compose -f docker-compose.prod.yml logs gateway
          exit 1

      - name: WS connect smoke
        run: npm run test:smoke:ws-connect

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --tail=200

      - name: Stop compose stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
